name: Unit Tests

on:
  pull_request:
    branches:
      - main # or your default target branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Example for a Node.js project (change this based on your backend stack)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test # This command must exit with code 0 if tests pass
